version: '3.8'

services:
  # API Gateway
  api-gateway:
    build: ./backend/services/api-gateway
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://augur:augur@postgres:5432/augur
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - augur-network

  # Agent Service
  agent-service:
    build: ./backend/services/agent-service
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://augur:augur@postgres:5432/augur_agents
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - augur-network

  # PostgreSQL
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: augur
      POSTGRES_PASSWORD: augur
      POSTGRES_DB: augur
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U augur"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - augur-network

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - augur-network

  # pgAdmin (для управления базой)
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@augur.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - augur-network

volumes:
  postgres-data:
  redis-data:

networks:
  augur-network:
    driver: bridge
